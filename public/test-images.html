<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猫图片测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .test-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .test-card h3 {
      margin: 0 0 10px 0;
      color: #333;
    }
    .test-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 8px;
      margin: 10px 0;
      background: #f0f0f0;
    }
    .test-card .status {
      font-size: 14px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    .summary {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-top: 30px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .summary h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>🐱 37只猫真猫图片测试</h1>
  
  <div class="test-grid" id="testGrid"></div>
  
  <div class="summary">
    <h2>测试结果</h2>
    <p>已加载: <span id="loaded">0</span> / <span id="total">0</span></p>
    <p id="message"></p>
  </div>

  <script>
    const cats = [
      { name: '困困猫', path: '/cats/困困猫.png', id: 'kun_kun_mao' },
      { name: '躲柜子猫', path: '/cats/躲柜子猫.jpg', id: 'duo_guizi_mao' },
      { name: '炸毛猫', path: '/cats/炸毛猫.jpg', id: 'zha_mao_mao' },
      { name: '舔毛猫', path: '/cats/舔毛猫.jpg', id: 'tian_mao_mao' },
      { name: '委屈猫', path: '/cats/委屈猫.jpg', id: 'wei_qu_mao' }
    ];

    let loaded = 0;
    const total = cats.length;

    const grid = document.getElementById('testGrid');
    const totalEl = document.getElementById('total');
    const loadedEl = document.getElementById('loaded');
    const messageEl = document.getElementById('message');

    totalEl.textContent = total;

    cats.forEach(cat => {
      const card = document.createElement('div');
      card.className = 'test-card';
      
      const img = document.createElement('img');
      img.src = cat.path;
      img.alt = cat.name;
      
      const title = document.createElement('h3');
      title.textContent = cat.name;
      
      const status = document.createElement('div');
      status.className = 'status';
      
      img.onload = () => {
        loaded++;
        loadedEl.textContent = loaded;
        status.className = 'status success';
        status.textContent = `✅ 加载成功 (${cat.id})`;
        if (loaded === total) {
          messageEl.textContent = '🎉 所有图片都加载成功！';
          messageEl.style.color = '#28a745';
        }
      };
      
      img.onerror = () => {
        status.className = 'status error';
        status.textContent = `❌ 加载失败 (${cat.id})`;
        messageEl.textContent = '⚠️ 有些图片加载失败';
        messageEl.style.color = '#dc3545';
      };
      
      card.appendChild(title);
      card.appendChild(img);
      card.appendChild(status);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
